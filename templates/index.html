<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skṛpṭ Learn.</title>
  <link rel="icon" type="image/svg+xml" href="/static/images/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Noto+Sans:wght@400;500&family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Noto+Serif+Bengali:wght@400;700&family=Noto+Serif+Devanagari:wght@400;700&family=Noto+Serif+Tamil:wght@400;700&family=Noto+Serif+Telugu:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <!-- ── WELCOME ──────────────────────────────────────────────────── -->
  <div id="screen-welcome" class="screen active">
    <nav class="welcome-nav">
      <button id="btn-settings-open" class="icon-btn" title="Settings" aria-label="Open settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </nav>

    <main class="welcome-body">
      <div style="display: flex; align-items: center; gap: 12px;">
        <img class="logomark" src="/static/images/icon.png" />
        <h1 class="wordmark">skṛpṭ<br>learn<span class="wordmark-dot">.</span></h1>
      </div>

      <p class="tagline">A way to familiarize oneself with new phonetic scripts and writing systems.</p>

      <div id="lang-grid" class="lang-grid" role="listbox" aria-label="Select a script">
        <!-- populated by JS -->
      </div>

      <button id="btn-start" class="btn-primary" disabled>
        Choose a script above
      </button>
    </main>
  </div>


  <!-- ── GAME ─────────────────────────────────────────────────────── -->
  <div id="screen-game" class="screen">

    <div class="game-chrome">
      <div class="topbar">
        <span id="progress" class="progress">1 / 3</span>
        <span id="timer" class="timer" aria-live="off">0.000</span>
      </div>
      <div class="score-bar">
        <select id="lang-select" class="lang-select" aria-label="Active script"></select>
        <span id="points" class="points">0 pts</span>
      </div>
    </div>

    <div class="specimen-area">
      <div class="specimen-rule"></div>

      <p id="script-word" class="specimen-word" lang="und" aria-label="Word to transliterate"></p>

      <div id="round-result" class="round-result hidden" aria-live="polite">
        <div class="result-label">round complete</div>
        <div id="result-score" class="result-score">—</div>
        <div id="result-best" class="result-best hidden">■ new best</div>
        <div id="result-mode-note" class="result-mode-note"></div>
      </div>

      <div class="specimen-rule"></div>
    </div>

    <div class="answer-area" id="answer-area">
    <!-- <div class="answer-area"> -->
      <div class="input-row">
        <input
          id="answer-input"
          type="text"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="none"
          spellcheck="false"
          placeholder="type transliteration…"
          aria-label="Your transliteration"
        >
        <button id="btn-verify" class="btn-verify">Verify</button>
      </div>
      <p id="feedback" class="feedback" aria-live="polite" aria-atomic="true"></p>
    </div>

    <div class="controls">
      <div class="mode-row">
        <span id="mode-label" class="mode-label">practice</span>
        <label class="toggle-wrap" title="Toggle practice / learning">
          <input type="checkbox" id="mode-toggle" role="switch" aria-label="Switch mode">
          <span class="toggle-track"><span class="toggle-knob"></span></span>
        </label>
      </div>

      <!-- learning mode: stage navigation -->
      <div id="stage-nav" class="stage-nav hidden" aria-label="Learning stage">
        <button id="btn-prev-stage" class="btn-stage" title="Previous stage" aria-label="Previous stage">◀</button>
        <span id="stage-label" class="stage-label">vowels</span>
        <button id="btn-next-stage" class="btn-stage" title="Next stage" aria-label="Next stage">▶</button>
      </div>

      <!-- practice mode: difficulty slider -->
      <div id="diff-control" class="diff-control" aria-label="Difficulty">
        <input type="range" min="0" max="3" step="1" value="0"
               id="diff-slider" aria-label="Difficulty level">
        <span id="diff-label" class="diff-label">single chars</span>
      </div>
    </div>

    <div class="game-footer">
      <button id="btn-end-round" class="btn-link">end round</button>
      <button id="btn-back-home" class="btn-link">← home</button>
    </div>

  </div>


  <!-- ── SETTINGS ─────────────────────────────────────────────────── -->
  <div id="screen-settings" class="screen">
    <div class="settings-header">
      <button id="btn-settings-back" class="btn-link back-link">← back</button>
    </div>
    <h2 class="settings-heading">settings</h2>

    <div class="settings-body">
      <div class="setting-row">
        <label for="num-words-input">words per round</label>
        <input type="number" id="num-words-input" min="1" max="50" value="3">
      </div>
      <div class="setting-row">
        <label>dark mode</label>
        <label class="toggle-wrap">
          <input type="checkbox" id="dark-toggle" checked>
          <span class="toggle-track"><span class="toggle-knob"></span></span>
        </label>
      </div>
      <div class="setting-row">
        <label>speak words <span class="setting-note">(browser TTS)</span></label>
        <label class="toggle-wrap">
          <input type="checkbox" id="speak-toggle">
          <span class="toggle-track"><span class="toggle-knob"></span></span>
        </label>
      </div>
    </div>
  </div>


  <script src="/static/js/app.js"></script>
</body>
</html>
